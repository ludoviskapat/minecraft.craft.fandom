```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Minecraft Craft Guide</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1b1b1b;
color:white;
display:flex;
}

.left{
width:60%;
padding:20px;
}

.right{
width:40%;
background:#222;
padding:20px;
border-left:3px solid #333;
}

header{
font-size:30px;
margin-bottom:20px;
}

.inventory{
display:grid;
grid-template-columns:repeat(6,60px);
gap:6px;
margin-bottom:20px;
}

.invslot{
width:60px;
height:60px;
background:#444;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
border-radius:6px;
}

.invslot img{
width:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,70px);
gap:6px;
}

.slot{
width:70px;
height:70px;
background:#8b5a2b;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
cursor:pointer;
}

.slot img{
width:45px;
}

.result{
margin-top:15px;
font-size:18px;
}

button{
padding:10px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="left">

<header>Minecraft Craft Guide</header>

<p>Inventaire :</p>
<div class="inventory" id="inventory"></div>

</div>

<div class="right">

<h2>Table de craft</h2>

<div class="grid" id="craft"></div>

<div class="result" id="result"></div>

<button onclick="clearGrid()">Clear</button>

</div>

<script>

const textures={
diamond:"https://minecraft.wiki/images/Diamond_JE3_BE3.png",
stick:"https://minecraft.wiki/images/Stick_JE2_BE2.png",
planks:"https://minecraft.wiki/images/Oak_Planks_JE4_BE3.png",
cobblestone:"https://minecraft.wiki/images/Cobblestone_JE5_BE3.png",
iron:"https://minecraft.wiki/images/Iron_Ingot_JE3_BE2.png"
}

const recipes=[

{
name:"Diamond Pickaxe",
pattern:[
"diamond","diamond","diamond",
"","stick","",
"","stick",""
]
},

{
name:"Stone Pickaxe",
pattern:[
"cobblestone","cobblestone","cobblestone",
"","stick","",
"","stick",""
]
},

{
name:"Crafting Table",
pattern:[
"planks","planks","",
"planks","planks","",
"","",""
]
}

]

let selected=null
let grid=["","","","","","","","",""]

const inventory=document.getElementById("inventory")
const craft=document.getElementById("craft")

Object.keys(textures).forEach(item=>{

const div=document.createElement("div")
div.className="invslot"

div.innerHTML=`<img src="${textures[item]}">`

div.onclick=()=>selected=item

inventory.appendChild(div)

})

for(let i=0;i<9;i++){

const div=document.createElement("div")
div.className="slot"

div.onclick=()=>{

if(selected){
grid[i]=selected
updateCraft()
}

}

craft.appendChild(div)

}

function updateCraft(){

const slots=document.querySelectorAll(".slot")

slots.forEach((s,i)=>{

s.innerHTML=""

if(grid[i]){
s.innerHTML=`<img src="${textures[grid[i]]}">`
}

})

checkRecipe()

}

function checkRecipe(){

for(const r of recipes){

if(JSON.stringify(r.pattern)==JSON.stringify(grid)){
document.getElementById("result").innerText="Craft: "+r.name
return
}

}

document.getElementById("result").innerText="No recipe"

}

function clearGrid(){

grid=["","","","","","","","",""]
updateCraft()

}

</script>

</body>
</html>
